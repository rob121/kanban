{{define "content"}}
<div class="container py-4" style="max-width: 560px;">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/boards">Boards</a></li>
            <li class="breadcrumb-item active">New</li>
        </ol>
    </nav>

    <h1 class="h3 fw-semibold mb-4">Create a board</h1>

    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}

    <form method="post" action="/boards" class="card shadow-sm border-0">
        <div class="card-body p-4">
            {{template "csrf" .}}
            <div class="mb-3">
                <label for="name" class="form-label">Board name</label>
                <input type="text" class="form-control" id="name" name="name" required autofocus placeholder="e.g. Product Roadmap">
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description <span class="text-muted">(optional)</span></label>
                <textarea class="form-control" id="description" name="description" rows="3" placeholder="What is this board for?"></textarea>
            </div>
            <div class="mb-4">
                <label for="color" class="form-label">Color</label>
                {{template "board-color-picker" (dict "ID" "color" "Selected" "#0d6efd")}}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create board</button>
                <a href="/boards" class="btn btn-outline-secondary">Cancel</a>
            </div>
            <p class="text-muted small mt-3 mb-0">Default columns will be added: Backlog, Ready to Start, In Progress, Complete.</p>
        </div>
    </form>
</div>
{{end}}
