<h1 style="margin:0 0 12px;font-size:22px;font-weight:600;line-height:1.3;color:#212529;">You're invited</h1>
<p style="margin:0 0 16px;">Hi {{.RecipientName}},</p>
<p style="margin:0 0 16px;">An administrator created a {{.SiteName}} account for you. Use the credentials below to sign in.</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px;background-color:#f8f9fa;border:1px solid #e9ecef;border-radius:8px;">
    <tr>
        <td style="padding:14px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;color:#495057;">
            <p style="margin:0 0 10px;"><strong>Sign-in URL:</strong><br><a href="{{.LoginURL}}" style="color:{{.BrandColor}};word-break:break-all;">{{.LoginURL}}</a></p>
            <p style="margin:0 0 10px;"><strong>Username:</strong> {{.Username}}</p>
            <p style="margin:0;"><strong>Temporary password:</strong> {{.Password}}</p>
        </td>
    </tr>
</table>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px;">
    <tr>
        <td align="center" style="border-radius:6px;background-color:{{.BrandColor}};">
            <!--[if mso]>
            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{.LoginURL}}" style="height:40px;v-text-anchor:middle;width:180px;" arcsize="10%" strokecolor="{{.BrandColor}}" fillcolor="{{.BrandColor}}">
            <w:anchorlock/>
            <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;">Sign in</center>
            </v:roundrect>
            <![endif]-->
            <!--[if !mso]><!-->
            <a href="{{.LoginURL}}" style="display:inline-block;padding:11px 22px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;line-height:1;color:#ffffff;text-decoration:none;border-radius:6px;background-color:{{.BrandColor}};">Sign in</a>
            <!--<![endif]-->
        </td>
    </tr>
</table>

<p style="margin:0;font-size:13px;color:#6c757d;">Please change your password after your first sign-in.</p>
