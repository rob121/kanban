<h1 style="margin:0 0 12px;font-size:22px;font-weight:600;line-height:1.3;color:#212529;">Card updated</h1>
<p style="margin:0 0 16px;">Hi {{.RecipientName}},</p>
<p style="margin:0 0 16px;"><strong>{{.ActorName}}</strong> updated <strong>{{.CardTitle}}</strong> on <strong>{{.BoardName}}</strong>.</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px;background-color:#f8f9fa;border:1px solid #e9ecef;border-radius:8px;">
    <tr>
        <td style="padding:14px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;color:#495057;">
            <p style="margin:0 0 8px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#6c757d;">Card</p>
            <p style="margin:0 0 4px;font-size:16px;font-weight:600;color:#212529;">{{.CardTitle}}</p>
            <p style="margin:0 0 4px;font-size:13px;color:#6c757d;">Column: <strong style="color:#212529;">{{.ColumnName}}</strong></p>
            <p style="margin:0;font-size:13px;color:#6c757d;">Priority: {{.Priority}}</p>
        </td>
    </tr>
</table>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 20px;">
    <tr>
        <td align="center" style="border-radius:6px;background-color:{{.BrandColor}};">
            <!--[if mso]>
            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{.CardURL}}" style="height:40px;v-text-anchor:middle;width:180px;" arcsize="10%" strokecolor="{{.BrandColor}}" fillcolor="{{.BrandColor}}">
            <w:anchorlock/>
            <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;">View card</center>
            </v:roundrect>
            <![endif]-->
            <!--[if !mso]><!-->
            <a href="{{.CardURL}}" style="display:inline-block;padding:11px 22px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;line-height:1;color:#ffffff;text-decoration:none;border-radius:6px;background-color:{{.BrandColor}};">View card</a>
            <!--<![endif]-->
        </td>
    </tr>
</table>
<p style="margin:0;font-size:13px;color:#6c757d;">If the button does not work, copy and paste this link into your browser:<br>
<a href="{{.CardURL}}" style="color:{{.BrandColor}};word-break:break-all;">{{.CardURL}}</a></p>
