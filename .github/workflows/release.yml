name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        type: string
      draft:
        description: Create as draft release
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark as pre-release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.suffix }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64

          - goos: linux
            goarch: arm64
            suffix: linux-arm64

          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "kanban-${{ matrix.suffix }}" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kanban-${{ matrix.suffix }}
          path: kanban-${{ matrix.suffix }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ inputs.tag }}"
            git push origin "${{ inputs.tag }}"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Add config example
        run: |
          cp config.example.json dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}